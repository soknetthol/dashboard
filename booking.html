<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="get"> 
        <fieldset>
          <table align="center" cellpadding="10">
            <caption><h2>Create Booking</h2></caption>
            <tr>
                <td><label>Customer Name:</label></td>
                <td><input type="text" name="txtCusname"></td>
            </tr>
            <tr>
                <td><label>Tel:</label></td>
                <td><input type="text" name="txtTel"></td>
            </tr>
            <tr>
                <td><label>Gender:</label></td>
                <td><input type="radio" name="txtGender" Value="Male">Male
        <input type="radio" name="txtGender" Value="Female">Female</td>
            </tr>
            <tr>
                <td><label>Check In Date:</label></td>
                <td><input type="date" name="dateCheckIn"></td>
            </tr>
            <tr>
                <td><label>Total day:</label></td>
                <td><input type="number" name="txtTotalDay" min="1"></td>
            </tr>
            <tr>
                <td><label>Room Number:</label></td>
                <td>
                    <select name="Rnum">
                        <optgroup label="single room">
                    <option>101</option>
                    <option>102</option>
                    <option>103</option>
                        </optgroup>
                        <optgroup label="Double room">
                    <option>201</option>
                    <option>202</option>
                    </optgroup>
                        <optgroup label="family room">
                    <option>203</option>
                    <option>301</option>
                        </optgroup>
                        <optgroup label="VIP room">
                    <option>302</option>
                    <option>303</option>
                        </optgroup>
                    </select>
            </td>
            </tr>
            <tr>
                <td><label>Note:</label></td>
                <td><textarea name="txtNote" rows="5" cols="40" placeholder="Type here..."></textarea></td>
            </tr>
            <tr>
                <td></td>
                <td><input type="submit" value="create">
                <input type="reset" value="clear"></td>
            </tr>
        </table>
    </fieldset>

       
        
    </form>
</body>
</html>
